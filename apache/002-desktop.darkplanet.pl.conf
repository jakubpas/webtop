<VirtualHost *:80>
    ServerName desktop.darkplanet.pl

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName desktop.darkplanet.pl

    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/desktop.darkplanet.pl/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/desktop.darkplanet.pl/privkey.pem

    # Basic Auth in front of everything - nothing below is reachable pre-auth.
    # Credentials: /etc/apache2/.htpasswd-desktop (bcrypt, user "kuba").
    <Location "/">
        AuthType Basic
        AuthName "desktop.darkplanet.pl"
        AuthUserFile /etc/apache2/.htpasswd-desktop
        Require valid-user
    </Location>

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # RewriteEngine must be explicitly re-enabled in this vhost - it does NOT
    # inherit from the :80 vhost above. Without this line, the WebSocket
    # upgrade rule below is silently ignored and all traffic (including the
    # Selkies WebSocket) falls through to the plain HTTP ProxyPass, which
    # cannot perform a protocol Upgrade - this was the root cause of
    # "WebSocket disconnected. Attempting to reconnect..." on first deploy.
    RewriteEngine On

    # WebSocket upgrade for Selkies streaming - must come before the plain
    # ProxyPass rules below so upgrade requests are routed through wstunnel.
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:8082/$1" [P,L]

    ProxyPass / http://127.0.0.1:8082/
    ProxyPassReverse / http://127.0.0.1:8082/

    #ErrorLog /var/log/apache2/desktop.darkplanet.pl/apache.log
    #CustomLog /var/log/apache2/desktop.darkplanet.pl/access.log combined
</VirtualHost>
</IfModule>
