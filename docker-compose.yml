services:
  webtop:
    # Custom image (see ./Dockerfile): Ubuntu-xfce base + official Google
    # Chrome installed alongside stock Chromium, so browser-sync sign-in
    # actually persists (open-source Chromium lacks Google's private OAuth
    # keys needed for that - see Dockerfile comment and AGENTS.md for the
    # full explanation). Built directly on darkplanet.pl (`docker compose
    # build`) - AMD64 native, and it's just an apt install layer, not a
    # heavy compile, so this doesn't meaningfully compete with production
    # services on this shared host.
    build:
      context: .
      dockerfile: Dockerfile
    image: webtop-ubuntu-chrome:local
    container_name: webtop
    restart: unless-stopped
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Europe/Warsaw
      # Performance-first tuning (2026-07-17): the box has no usable hardware
      # video encode path (x264enc/pixelflux forces use_cpu=True regardless of
      # the host's Intel iGPU - only nvh264enc/NVENC would use hardware, and
      # there's no NVIDIA GPU here), so the only real CPU levers are fewer
      # pixels, fewer frames/sec, and a cheaper CRF. Quality is not a concern
      # per user request - traded down aggressively.
      - SCREEN_WIDTH=1600
      - SCREEN_HEIGHT=900
      - SELKIES_IS_MANUAL_RESOLUTION_MODE=true
      - SELKIES_MANUAL_WIDTH=1600
      - SELKIES_MANUAL_HEIGHT=900
      - SELKIES_USE_CSS_SCALING=true
      - SELKIES_SCALING_DPI=96
      - SELKIES_FRAMERATE=15
      - SELKIES_H264_CRF=38
      - SELKIES_ENCODER=x264enc
      - CHROME_ARGS=--password-store=basic --no-sandbox
    ports:
      # Loopback-only: nothing external can reach the container directly.
      # Apache is the only path in (TLS + Basic Auth), proxying to this port.
      - "127.0.0.1:8082:3000"
    volumes:
      # Hardcoded rather than ${HOME}-interpolated: this project always runs
      # `sudo docker compose ...` (kuba isn't in the docker group), and sudo
      # resets $HOME to /root by default - `${HOME}/webtop_data` silently
      # resolved to /root/webtop_data instead of kuba's home, diverging from
      # the path this repo's docs/backup script assume. Hardcoding avoids
      # that footgun regardless of how the command is invoked.
      - /home/kuba/webtop_data:/config
    shm_size: "1gb"
    mem_limit: "2g"
    cpus: 2
    # NOTE: tried `cap_drop: [ALL]` + `no-new-privileges:true` for extra
    # isolation, but linuxserver/webtop's s6-init + nginx + X11 stack isn't
    # designed to run capability-restricted (s6-applyuidgid needs setgroups,
    # nginx needs to write its own log files / load modules, etc.) - it broke
    # the container outright. Reverted; relying on the loopback-only port
    # binding + mem/cpu caps + Apache-level auth for isolation instead.
